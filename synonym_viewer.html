<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>同義語マスター — 粗大ごみ判定アプリ</title>
<style>
:root{--p:#34C759;--pd:#28A745;--pl:#F0FBF4;--bg:#F4F6FB;--card:#fff;--t1:#1C1C1E;--t2:#636366;--t3:#8E8E93;--b:#E5E5EA;--warn:#FF3B30}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;background:var(--bg);color:var(--t1);-webkit-font-smoothing:antialiased}
.hd{background:linear-gradient(135deg,var(--p),var(--pd));color:#fff;padding:20px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.hd-title{font-size:20px;font-weight:800}
.hd-sub{font-size:12px;opacity:.85;margin-top:4px}
.hd-stats{background:rgba(255,255,255,.2);padding:8px 14px;border-radius:10px;font-size:13px;font-weight:600;text-align:center}
.hd-stats span{font-size:22px;font-weight:800;display:block}
.controls{padding:16px 24px;background:var(--card);border-bottom:1px solid var(--b);display:flex;gap:10px;flex-wrap:wrap;align-items:center;position:sticky;top:0;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.search-wrap{flex:1;min-width:200px;position:relative}
.search-wrap input{width:100%;padding:10px 14px 10px 38px;border:1.5px solid var(--b);border-radius:10px;font-size:14px;outline:none}
.search-wrap input:focus{border-color:var(--p)}
.search-wrap::before{content:"🔍";position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:14px}
.cat-filter{display:flex;gap:6px;flex-wrap:wrap}
.cat-btn{padding:7px 12px;border:1.5px solid var(--b);background:var(--card);border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;color:var(--t2);transition:all .15s;white-space:nowrap}
.cat-btn.active{background:var(--p);color:#fff;border-color:var(--p)}
.count-badge{font-size:12px;color:var(--t3);padding:4px 0;white-space:nowrap}
.main{padding:16px 24px}
.item-card{background:var(--card);border-radius:14px;margin-bottom:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.05);border:1px solid var(--b);display:none}
.item-card.visible{display:block}
.item-card.is-ngonly{border-left:4px solid var(--warn)}
.card-head{padding:14px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .1s}
.card-head:hover{background:#F9F9FC}
.cat-tag{flex-shrink:0;font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;background:var(--pl);color:var(--pd)}
.cat-tag.ng{background:#FFF0ED;color:var(--warn)}
.item-name{font-size:15px;font-weight:700;flex:1}
.item-yomi{font-size:11px;color:var(--t3);margin-top:2px}
.acc-ico{font-size:12px;color:var(--t3);transition:transform .2s;flex-shrink:0}
.card-head.open .acc-ico{transform:rotate(180deg);color:var(--p)}
.card-body{max-height:0;overflow:hidden;transition:max-height .3s ease}
.card-body.open{max-height:600px}
.card-inner{padding:0 16px 16px;border-top:1px solid #F2F2F7}
.section{margin-top:12px}
.section-lbl{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.06em;margin-bottom:8px;text-transform:uppercase}
.syn-list{display:flex;flex-wrap:wrap;gap:6px}
.syn-chip{padding:5px 10px;background:#F4F6FB;border:1px solid var(--b);border-radius:16px;font-size:12px;color:var(--t1);cursor:pointer;transition:background .1s}
.syn-chip:hover,.syn-chip.highlight{background:var(--pl);border-color:var(--p);color:var(--pd);font-weight:600}
.syn-chip.en{background:#F0F4FF;border-color:#C7D5FF;color:#0057D8}
.incl-box{background:#F9FCF9;border-radius:8px;padding:10px 12px;font-size:12.5px;color:var(--t2);line-height:1.7;border-left:3px solid var(--p)}
.incl-box.warn{background:#FFF5F5;border-left-color:var(--warn);color:#C0392B}
.edit-hint{font-size:11px;color:var(--t3);margin-top:6px;display:flex;align-items:center;gap:4px}
.empty{text-align:center;padding:40px;color:var(--t3);font-size:14px}
.footer{text-align:center;padding:24px;font-size:11px;color:var(--t3);border-top:1px solid var(--b);margin-top:20px}
.footer a{color:var(--p)}
@media print{.controls{position:static}.item-card{break-inside:avoid}.card-body{max-height:none!important}}
@media(max-width:600px){.main{padding:12px}.controls{padding:12px}}
</style>
</head>

<div class="hd">

<div class="controls">

  </div>

  <div class="count-badge" id="countBadge"></div>
</div>

<div class="main" id="main"></div>

// カテゴリ一覧を生成
const cats = [...new Set(MASTER.map(m => m.cat))];
const catFilter = document.getElementById('catFilter');
cats.forEach(c => {
  const btn = document.createElement('button');
  btn.className = 'cat-btn';
  btn.dataset.cat = c;
  btn.textContent = c;
  btn.onclick = () => setCat(btn, c);
  catFilter.appendChild(btn);
});

// 統計計算
let totalSyn = 0;
MASTER.forEach(m => {
  totalSyn += m.syn.split('|').length + m.en.split(' ').length;
});
document.getElementById('statTotal').textContent = MASTER.length;
document.getElementById('statSyn').textContent = totalSyn.toLocaleString();
document.getElementById('updateDate').textContent = '更新: 2026年4月';

// レンダリング
const mainEl = document.getElementById('main');
let activeCat = '', searchQ = '';

function render() {
  const q = searchQ.toLowerCase();
  let count = 0;
  document.querySelectorAll('.item-card').forEach((card, i) => {
    const m = MASTER[i];
    const catMatch = !activeCat || m.cat === activeCat;
    const qMatch = !q || [m.name, m.yomi, m.syn, m.en, m.incl].join(' ').toLowerCase().includes(q);
    const show = catMatch && qMatch;
    card.classList.toggle('visible', show);
    if (show) count++;
  });
  document.getElementById('countBadge').textContent = `${count}件表示中`;
}

function setCat(btn, cat) {
  activeCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function filterAll() {
  searchQ = document.getElementById('searchBox').value;
  render();
}

function toggleCard(idx) {
  const body = document.getElementById('cb' + idx);
  const head = document.getElementById('ch' + idx);
  body.classList.toggle('open');
  head.classList.toggle('open');
}

// カード生成
MASTER.forEach((m, i) => {
  const syns = m.syn.split('|');
  const ens = m.en.split(' ');
  const q = searchQ;
  const card = document.createElement('div');
  card.className = `item-card visible${m.ng ? ' is-ngonly' : ''}`;

  card.innerHTML = `
    <div class="card-head" id="ch${i}" onclick="toggleCard(${i})">
      <span class="cat-tag${m.ng ? ' ng' : ''}">${m.cat}</span>
      <div>
        <div class="item-name">${m.name}</div>
        <div class="item-yomi">${m.yomi}</div>
      </div>
      <span style="margin-left:auto;font-size:12px;color:var(--t3);margin-right:8px">${syns.length + ens.length}語</span>
      <span class="acc-ico">▼</span>
    </div>
    <div class="card-body" id="cb${i}">
      <div class="card-inner">
        <div class="section">
          <div class="section-lbl">🔤 同義語・別名・言い換え（${syns.length}語）</div>
          <div class="syn-list">
            ${syns.map(s => `<span class="syn-chip">${s}</span>`).join('')}
          </div>
        </div>
        <div class="section">
          <div class="section-lbl">🌐 英語キーワード</div>
          <div class="syn-list">
            ${ens.map(e => `<span class="syn-chip en">${e}</span>`).join('')}
          </div>
        </div>
        <div class="section">
          <div class="section-lbl">📦 含まれるもの・具体例</div>
          <div class="incl-box${m.ng ? ' warn' : ''}">${m.incl}</div>
        </div>
        <div class="edit-hint">
          ✏️ synonym_master_v2.csv の ${i + 2} 行目を編集すると更新できます
        </div>
      </div>
    </div>
  `;
  mainEl.appendChild(card);
});

render();

// 検索ボックスにフォーカス
setTimeout(() => document.getElementById('searchBox').focus(), 100);
</script>
